<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trotant | ¡Estamos de vuelta!</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Estilos globales y reseteo */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #1a1a1a;
        }

        /* Contenedor principal con fondo de imagen */
        .hero-section {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            color: #ffffff;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            background-image: url('https://images.unsplash.com/photo-1521295121783-8a321d551ad2?q=80&w=2000');
            background-size: cover;
            background-position: center;
        }

        /* Superposición oscura */
        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 1;
        }

        .content {
            z-index: 2;
            max-width: 800px;
        }

        h1 {
            font-weight: 700;
            font-size: 4em;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }

        h2.main-subtitle {
            font-weight: 400;
            font-size: 1.5em;
            color: #bdbdbd;
            margin-bottom: 10px;
            margin-top: -10px;
        }

        .message-list {
            margin-bottom: 30px;
        }

        .message-item {
            font-weight: 400;
            font-size: 1.2em;
            margin: 5px 0;
            color: #bdbdbd;
        }

        /* ESTILO DEL BOTÓN NUEVO */
        .cta-button {
            display: inline-block;
            padding: 15px 40px;
            background-color: #1DE9B6; /* Verde aguamarina */
            color: #1a1a1a; /* Texto oscuro para contraste */
            font-weight: 700;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            cursor: pointer;
        }

        .cta-button:hover {
            background-color: #1aebd5;
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(29, 233, 182, 0.3);
        }

        /* Adaptación para móviles */
        @media (max-width: 600px) {
            h1 { font-size: 2.5em; }
            h2 { font-size: 1.2em; }
            .message-item { font-size: 1em; }
        }
    </style>
</head>
<body>
    <div class="hero-section">
        <div class="content">
            <h1>TROTANT</h1>
            
            <div class="message-list">
                <h2 class="main-subtitle">¡ESTAMOS DE VUELTA!</h2>
                <div class="message-item">ESTEM DE TORNADA!</div>
                <div class="message-item">WE ARE BACK!</div>
                <div class="message-item">SIAMO TORNATI!</div>
            </div>

            <a href="home.html" class="cta-button">Entrar a la web</a>
        </div>
    </div>
</body>
</html>
